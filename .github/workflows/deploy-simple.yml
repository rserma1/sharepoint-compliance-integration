name: Deploy SharePoint Compliance (SIMPLE)

on:
  workflow_dispatch:

env:
  PROJECT_ID: pmops-docai-dev-e93d
  REGION: us-central1
  FUNCTION_NAME: sharepoint-compliance-processor-test
  BUCKET_NAME: product-compliance-data-pmops-docai-dev-e93d

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    
    - name: Setup GCP
      uses: google-github-actions/setup-gcloud@v1
    
    - name: Configure GCP
      run: |
        gcloud config set project ${{ env.PROJECT_ID }}
        gcloud config set compute/region ${{ env.REGION }}
    
    - name: Enable APIs
      run: |
        gcloud services enable cloudfunctions.googleapis.com
        gcloud services enable cloudscheduler.googleapis.com
        gcloud services enable secretmanager.googleapis.com
        gcloud services enable storage.googleapis.com
        gcloud services enable cloudbuild.googleapis.com
    
    - name: Create Service Account
      run: |
        SA_EMAIL="${{ env.FUNCTION_NAME }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
        
        gcloud iam service-accounts create ${{ env.FUNCTION_NAME }} \
          --display-name="SharePoint Compliance Processor" 2>/dev/null || echo "Service account exists"
        
        gcloud projects add-iam-policy-binding ${{ env.PROJECT_ID }} \
          --member="serviceAccount:$SA_EMAIL" \
          --role="roles/secretmanager.secretAccessor" 2>/dev/null || true
        
        gcloud projects add-iam-policy-binding ${{ env.PROJECT_ID }} \
          --member="serviceAccount:$SA_EMAIL" \
          --role="roles/storage.objectAdmin" 2>/dev/null || true
        
        gcloud projects add-iam-policy-binding ${{ env.PROJECT_ID }} \
          --member="serviceAccount:$SA_EMAIL" \
          --role="roles/logging.logWriter" 2>/dev/null || true
    
    - name: Create Secrets
      run: |
        echo "test-client-secret" | gcloud secrets create sharepoint-compliance-client-secret --data-file=- 2>/dev/null || echo "Secret exists"
        echo "test-tenant-id" | gcloud secrets create sharepoint-compliance-tenant-id --data-file=- 2>/dev/null || echo "Secret exists"
        echo "test-stack.splunkcloud.com" | gcloud secrets create sharepoint-compliance-splunk-host --data-file=- 2>/dev/null || echo "Secret exists"
        echo "test-hec-token" | gcloud secrets create sharepoint-compliance-splunk-token --data-file=- 2>/dev/null || echo "Secret exists"
    
    - name: Create Storage Bucket
      run: |
        gsutil mb -l ${{ env.REGION }} gs://${{ env.BUCKET_NAME }} 2>/dev/null || echo "Bucket exists"
    
    - name: Deploy Cloud Function
      run: |
        cd gcp
        cp main_test.py main.py
        
        gcloud functions deploy ${{ env.FUNCTION_NAME }} \
          --gen2 \
          --runtime=python39 \
          --region=${{ env.REGION }} \
          --source=. \
          --entry-point=process_sharepoint_compliance_test \
          --trigger-http \
          --allow-unauthenticated \
          --timeout=540s \
          --memory=1024MiB \
          --set-env-vars="GCP_PROJECT=${{ env.PROJECT_ID }},GCS_BUCKET=${{ env.BUCKET_NAME }},SECRET_PREFIX=sharepoint-compliance,USE_SEED_DATA=true"
    
    - name: Get Function URL
      run: |
        FUNCTION_URL=$(gcloud functions describe ${{ env.FUNCTION_NAME }} --gen2 --region=${{ env.REGION }} --format='value(serviceConfig.uri)')
        echo "🎉 Deployment Complete!"
        echo "Function URL: $FUNCTION_URL"
        echo ""
        echo "Test with: curl -X POST $FUNCTION_URL"
