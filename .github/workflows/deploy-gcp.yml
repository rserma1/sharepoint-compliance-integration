name: Deploy SharePoint Compliance Processor to GCP

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'sharepoint-integration/gcp/**'
      - 'sharepoint-integration/sharepoint_client.py'
      - 'sharepoint-integration/splunk_client.py'
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Deploy environment'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - prod

env:
  PROJECT_ID: pmops-docai-dev-e93d
  REGION: us-central1
  FUNCTION_NAME: sharepoint-compliance-processor
  BUCKET_NAME: product-compliance-data-pmops-docai-dev-e93d
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        cd sharepoint-integration/gcp
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        cd sharepoint-integration/gcp
        python -m pytest tests/ -v || echo "No tests found, skipping..."

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v0
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    
    - name: Setup GCP
      uses: google-github-actions/setup-gcloud@v0
      with:
        project_id: ${{ env.PROJECT_ID }}
        service_account_key: ${{ secrets.GCP_SA_KEY }}
    
    - name: Use GCP CLI
      run: |
        gcloud info
        gcloud config set project ${{ env.PROJECT_ID }}
        gcloud config set compute/region ${{ env.REGION }}
    
    - name: Enable APIs
      run: |
        gcloud services enable \
          cloudfunctions.googleapis.com \
          cloudscheduler.googleapis.com \
          secretmanager.googleapis.com \
          storage.googleapis.com \
          logging.googleapis.com \
          monitoring.googleapis.com \
          cloudbuild.googleapis.com
    
    - name: Create Service Account
      run: |
        SA_EMAIL="${{ env.FUNCTION_NAME }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
        
        if ! gcloud iam service-accounts describe $SA_EMAIL &>/dev/null; then
          gcloud iam service-accounts create ${{ env.FUNCTION_NAME }} \
            --display-name="SharePoint Compliance Processor" \
            --description="Service account for SharePoint compliance data processing"
        fi
        
        # Grant permissions
        gcloud projects add-iam-policy-binding ${{ env.PROJECT_ID }} \
          --member="serviceAccount:$SA_EMAIL" \
          --role="roles/secretmanager.secretAccessor"
        
        gcloud projects add-iam-policy-binding ${{ env.PROJECT_ID }} \
          --member="serviceAccount:$SA_EMAIL" \
          --role="roles/storage.objectAdmin"
        
        gcloud projects add-iam-policy-binding ${{ env.PROJECT_ID }} \
          --member="serviceAccount:$SA_EMAIL" \
          --role="roles/logging.logWriter"
        
        gcloud projects add-iam-policy-binding ${{ env.PROJECT_ID }} \
          --member="serviceAccount:$SA_EMAIL" \
          --role="roles/monitoring.metricWriter"
    
    - name: Setup Secrets
      run: |
        # Create secrets if they don't exist
        if ! gcloud secrets describe sharepoint-compliance-client-secret &>/dev/null; then
          echo "${{ secrets.SHAREPOINT_CLIENT_SECRET }}" | gcloud secrets create sharepoint-compliance-client-secret --data-file=-
        fi
        
        if ! gcloud secrets describe sharepoint-compliance-tenant-id &>/dev/null; then
          echo "${{ secrets.SHAREPOINT_TENANT_ID }}" | gcloud secrets create sharepoint-compliance-tenant-id --data-file=-
        fi
        
        # Optional Splunk secrets
        if [ -n "${{ secrets.SPLUNK_HOST }}" ]; then
          if ! gcloud secrets describe sharepoint-compliance-splunk-host &>/dev/null; then
            echo "${{ secrets.SPLUNK_HOST }}" | gcloud secrets create sharepoint-compliance-splunk-host --data-file=-
          fi
        fi
        
        if [ -n "${{ secrets.SPLUNK_HEC_TOKEN }}" ]; then
          if ! gcloud secrets describe sharepoint-compliance-splunk-token &>/dev/null; then
            echo "${{ secrets.SPLUNK_HEC_TOKEN }}" | gcloud secrets create sharepoint-compliance-splunk-token --data-file=-
          fi
        fi
    
    - name: Create Storage Bucket
      run: |
        if ! gsutil ls "gs://${{ env.BUCKET_NAME }}" &>/dev/null; then
          gsutil mb -l ${{ env.REGION }} "gs://${{ env.BUCKET_NAME }}"
        fi
    
    - name: Deploy Cloud Function
      run: |
        cd sharepoint-integration/gcp
        
        gcloud functions deploy ${{ env.FUNCTION_NAME }} \
          --runtime python39 \
          --region ${{ env.REGION }} \
          --trigger-http \
          --entry-point process_sharepoint_compliance \
          --source . \
          --service-account "${{ env.FUNCTION_NAME }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
          --timeout 540s \
          --memory 1024MiB \
          --set-env-vars="GCP_PROJECT=${{ env.PROJECT_ID }},GCS_BUCKET=${{ env.BUCKET_NAME }},SECRET_PREFIX=sharepoint-compliance"
    
    - name: Create Cloud Scheduler
      run: |
        FUNCTION_URL=$(gcloud functions describe ${{ env.FUNCTION_NAME }} --region ${{ env.REGION }} --format='value(httpsUrl)')
        SA_EMAIL="${{ env.FUNCTION_NAME }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
        
        # Delete existing job if it exists
        gcloud scheduler jobs delete ${{ env.FUNCTION_NAME }}-scheduler --location ${{ env.REGION }} &>/dev/null || true
        
        gcloud scheduler jobs create http ${{ env.FUNCTION_NAME }}-scheduler \
          --schedule "0 6 * * *" \
          --http-method POST \
          --uri "$FUNCTION_URL" \
          --oidc-service-account-email "$SA_EMAIL" \
          --time-zone UTC \
          --description="Daily SharePoint compliance data processing"
    
    - name: Test Deployment
      run: |
        FUNCTION_URL=$(gcloud functions describe ${{ env.FUNCTION_NAME }} --region ${{ env.REGION }} --format='value(httpsUrl)')
        
        echo "Testing function at: $FUNCTION_URL"
        
        # Wait a moment for function to be ready
        sleep 30
        
        # Test the function
        RESPONSE=$(curl -s -X POST "$FUNCTION_URL" -H "Content-Type: application/json" -d '{}')
        echo "Function response: $RESPONSE"
        
        # Check if response contains success
        if echo "$RESPONSE" | grep -q '"status":"success"'; then
          echo "✅ Function test passed"
        else
          echo "❌ Function test failed"
          exit 1
        fi
    
    - name: Create Monitoring Dashboard
      run: |
        # Create custom metrics and alerts
        gcloud monitoring dashboards create --config-from-file=monitoring.yaml || echo "Dashboard creation failed, continuing..."
    
    - name: Output Deployment Info
      run: |
        FUNCTION_URL=$(gcloud functions describe ${{ env.FUNCTION_NAME }} --region ${{ env.REGION }} --format='value(httpsUrl)')
        
        echo "🎉 Deployment Complete!"
        echo "=========================================="
        echo "Function URL: $FUNCTION_URL"
        echo "Project ID: ${{ env.PROJECT_ID }}"
        echo "Region: ${{ env.REGION }}"
        echo "Bucket: gs://${{ env.BUCKET_NAME }}"
        echo "=========================================="
        echo ""
        echo "📊 Monitoring:"
        echo "  • Logs: https://console.cloud.google.com/logs/viewer?project=${{ env.PROJECT_ID }}"
        echo "  • Functions: https://console.cloud.google.com/functions/list?project=${{ env.PROJECT_ID }}"
        echo "  • Storage: https://console.cloud.google.com/storage/browser/${{ env.BUCKET_NAME }}"
        echo ""
        echo "🔧 Management Commands:"
        echo "  • View logs: gcloud functions logs read ${{ env.FUNCTION_NAME }} --region ${{ env.REGION }}"
        echo "  • Test manually: curl -X POST $FUNCTION_URL"
        echo "  • Update schedule: gcloud scheduler jobs update ${{ env.FUNCTION_NAME }}-scheduler --schedule '0 8 * * *'"
